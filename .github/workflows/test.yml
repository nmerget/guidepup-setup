name: Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: yarn install --frozen-lockfile
      - run: yarn ci
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: artifacts
          path: |
            **/recordings/**/*
